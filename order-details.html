<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - FineQuill</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Header sama seperti halaman lain -->
    
    <section class="order-details">
        <div class="container">
            <div class="order-container" id="order-container">
                <!-- Order details will be loaded via JavaScript -->
            </div>
        </div>
    </section>
    
    <!-- Footer sama seperti halaman lain -->
    
    <script src="assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
            
            const order = JSON.parse(localStorage.getItem('currentOrder'));
            const container = document.getElementById('order-container');
            
            if (order) {
                container.innerHTML = `
                    <div class="order-header">
                        <h2>Order #${order.orderNumber}</h2>
                        <div class="order-meta">
                            <span class="status-badge ${order.status.toLowerCase()}">${order.status}</span>
                            <span>Placed on ${new Date(order.date).toLocaleDateString()}</span>
                        </div>
                    </div>
                    
                    <div class="order-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-items">
                            ${order.items.map(item => {
                                const product = products.find(p => p.id === item.id);
                                return product ? `
                                    <div class="summary-item">
                                        <div class="item-image">
                                            <img src="${product.image}" alt="${product.name}">
                                        </div>
                                        <div class="item-details">
                                            <h4>${product.name}</h4>
                                            <div class="item-meta">
                                                <span>Quantity: ${item.quantity}</span>
                                                <span>RM ${product.price.toFixed(2)} each</span>
                                            </div>
                                        </div>
                                        <div class="item-total">
                                            RM ${(product.price * item.quantity).toFixed(2)}
                                        </div>
                                    </div>
                                ` : '';
                            }).join('')}
                        </div>
                        
                        <div class="summary-totals">
                            <div class="summary-row">
                                <span>Subtotal</span>
                                <span>RM ${order.items.reduce((total, item) => {
                                    const product = products.find(p => p.id === item.id);
                                    return total + (product ? product.price * item.quantity : 0);
                                }, 0).toFixed(2)}</span>
                            </div>
                            <div class="summary-row">
                                <span>Shipping</span>
                                <span>RM ${(order.total - order.items.reduce((total, item) => {
                                    const product = products.find(p => p.id === item.id);
                                    return total + (product ? product.price * item.quantity : 0);
                                }, 0)).toFixed(2)}</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total</span>
                                <span>RM ${order.total.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="order-info">
                        <div class="shipping-info">
                            <h3>Shipping Information</h3>
                            <p>${order.address}</p>
                        </div>
                        
                        <div class="payment-info">
                            <h3>Payment Method</h3>
                            <p>${order.paymentMethod}</p>
                        </div>
                    </div>
                    
                    <div class="order-actions">
                        <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Order not found</h3>
                        <p>Please check your order history in the dashboard</p>
                        <a href="dashboard.html" class="btn">Go to Dashboard</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
